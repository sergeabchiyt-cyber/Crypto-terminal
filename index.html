<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Stream Trading Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #131722; color: #fff; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #131722; }
    ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 2px; }

    .depth-row {
      position: relative;
      display: flex;
      justify-content: space-between;
      padding: 1px 6px;
      font-size: 11px;
      line-height: 1.65;
    }
    .depth-bar {
      position: absolute; top: 0; bottom: 0; right: 0;
      opacity: 0.13; pointer-events: none;
    }
    .depth-col { position: relative; z-index: 1; }

    /* Exchange accent colours — used on the left border of tape rows only */
    .ex-BINANCE      { border-color: #f0b90b; }
    .ex-BINANCEFUT   { border-color: #f3d06d; }
    .ex-BYBIT        { border-color: #ff6b35; }
    .ex-BYBITLIN     { border-color: #ff9a6c; }
    .ex-OKX          { border-color: #60a5fa; }
    .ex-OKXFUT       { border-color: #93c5fd; }
    .ex-GATE         { border-color: #34d399; }
    .ex-MEXC         { border-color: #a78bfa; }
    .ex-BITGET       { border-color: #fb923c; }
    .ex-KUCOIN       { border-color: #22d3ee; }
    .ex-CRYPTOCOM    { border-color: #6366f1; }
    .ex-BITSTAMP     { border-color: #84cc16; }
    .ex-GEMINI       { border-color: #e879f9; }
    .ex-KRAKEN       { border-color: #7c3aed; }
    .ex-COINBASE     { border-color: #0ea5e9; }
    .ex-BITFINEX     { border-color: #f97316; }
    .ex-HTX          { border-color: #10b981; }
    .ex-PHEMEX       { border-color: #d946ef; }
    .ex-POLONIEX     { border-color: #fcd34d; }
    .ex-BINGX        { border-color: #38bdf8; }
    .ex-WOOX         { border-color: #ec4899; }
    .ex-DERIBIT      { border-color: #c084fc; }

    /* Exchange label colours — status panel only */
    .exl-BINANCE      { color: #f0b90b; }
    .exl-BINANCEFUT   { color: #f3d06d; }
    .exl-BYBIT        { color: #ff6b35; }
    .exl-BYBITLIN     { color: #ff9a6c; }
    .exl-OKX          { color: #60a5fa; }
    .exl-OKXFUT       { color: #93c5fd; }
    .exl-GATE         { color: #34d399; }
    .exl-MEXC         { color: #a78bfa; }
    .exl-BITGET       { color: #fb923c; }
    .exl-KUCOIN       { color: #22d3ee; }
    .exl-CRYPTOCOM    { color: #6366f1; }
    .exl-BITSTAMP     { color: #84cc16; }
    .exl-GEMINI       { color: #e879f9; }
    .exl-KRAKEN       { color: #7c3aed; }
    .exl-COINBASE     { color: #0ea5e9; }
    .exl-BITFINEX     { color: #f97316; }
    .exl-HTX          { color: #10b981; }
    .exl-PHEMEX       { color: #d946ef; }
    .exl-POLONIEX     { color: #fcd34d; }
    .exl-BINGX        { color: #38bdf8; }
    .exl-WOOX         { color: #ec4899; }
    .exl-DERIBIT      { color: #c084fc; }

    /* Status dot */
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }
    .status-dot.connected    { background: #22c55e; }
    .status-dot.connecting   { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Status grid */
    #ex-status-panel {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }
    .ex-status-chip {
      display: flex; align-items: center; gap: 3px;
      font-size: 8px; padding: 2px 3px;
      background: #131722; border-radius: 3px;
      overflow: hidden; white-space: nowrap;
    }

    /* Tape row — 3-column, exchange identified only by left border stripe */
    .tape-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 1px 6px 1px 8px;
      border-left: 3px solid transparent;
      border-bottom: 1px solid #1a1d2e;
    }
    .tape-row .t-price  { }
    .tape-row .t-qty    { text-align: right; }
    .tape-row .t-time   { text-align: right; color: #6b7280; font-size: 10px; }

    /* Tape buy/sell colour */
    .tape-buy  { color: #4ade80; }
    .tape-sell { color: #f87171; }

    /* Chart fills its host */
    #chart-container { width: 100%; height: 100%; }

    /* DOM spread */
    #dom-spread {
      text-align: center;
      font-family: monospace;
      font-weight: 700;
      font-size: 11px;
      color: #facc15;
      background: #1c2030;
      border-radius: 3px;
      padding: 2px 0;
      margin: 2px 0;
      flex-shrink: 0;
    }
  </style>
</head>

<body class="flex h-screen w-screen font-sans antialiased">

  <!-- ══════════════════════════════════════════════════════
       LEFT — TradingView Chart (78%)
  ══════════════════════════════════════════════════════ -->
  <div class="flex-shrink-0 h-full relative border-r border-neutral-800"
       style="width:78%;" id="chart-viewport">
    <div id="chart-container"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       RIGHT — Sidebar (22%)
  ══════════════════════════════════════════════════════ -->
  <div class="h-full flex flex-col bg-[#131722] select-none overflow-hidden"
       style="width:22%;">

    <!-- ── Header ── -->
    <div class="flex-shrink-0 px-3 py-2 border-b border-neutral-800 bg-[#1c2030] space-y-2">

      <!-- Symbol row -->
      <div class="flex items-center gap-2">
        <div class="flex-1">
          <label class="block text-[9px] font-bold text-neutral-500 tracking-widest uppercase mb-0.5">
            Instrument
          </label>
          <select id="asset-selector"
                  onchange="switchSymbol(this.value)"
                  class="w-full bg-[#131722] border border-neutral-800
                         text-xs text-yellow-400 font-mono font-bold
                         py-1 px-2 rounded cursor-pointer focus:outline-none">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
            <option value="BNBUSDT">BNB / USDT</option>
            <option value="XRPUSDT">XRP / USDT</option>
          </select>
        </div>
        <div class="text-right flex-shrink-0 pt-4">
          <div id="ticker-price"
               class="font-mono font-bold text-base text-neutral-100 tabular-nums">
            --
          </div>
        </div>
      </div>

      <!-- Mini stats -->
      <div class="grid grid-cols-3 gap-1 text-[9px] font-mono">
        <div class="bg-[#131722] rounded px-1.5 py-1">
          <div class="text-neutral-500">Streams</div>
          <div id="stat-streams" class="text-green-400 font-bold">0/22</div>
        </div>
        <div class="bg-[#131722] rounded px-1.5 py-1">
          <div class="text-neutral-500">Trades/s</div>
          <div id="stat-tps" class="text-yellow-400 font-bold">0</div>
        </div>
        <div class="bg-[#131722] rounded px-1.5 py-1">
          <div class="text-neutral-500">Volume</div>
          <div id="stat-vol" class="text-blue-400 font-bold">--</div>
        </div>
      </div>
    </div>

    <!-- ── Order Book DOM ── -->
    <div class="flex-shrink-0 flex flex-col px-2 py-1 border-b border-neutral-800"
         style="height:230px;">
      <!-- Column headers -->
      <div class="grid grid-cols-2 text-[9px] text-neutral-500 pb-0.5
                  border-b border-neutral-800 mb-0.5 font-mono">
        <span>Price (USDT)</span>
        <span class="text-right">Size</span>
      </div>
      <!-- Asks — rendered bottom-up via flex-col-reverse -->
      <div id="dom-asks" class="flex flex-col-reverse overflow-hidden flex-1"></div>
      <!-- Spread -->
      <div id="dom-spread">SPREAD: --</div>
      <!-- Bids -->
      <div id="dom-bids" class="flex flex-col overflow-hidden flex-1"></div>
    </div>

    <!-- ── Unified Trade Tape ── -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Tape column headers -->
      <div class="flex-shrink-0 grid grid-cols-3 text-[9px] text-neutral-500
                  px-2 py-1 border-b border-neutral-800 bg-[#1c2030] font-mono">
        <span>Price</span>
        <span class="text-right">Qty</span>
        <span class="text-right">Time</span>
      </div>
      <!-- Tape rows — newest at top via flex-col-reverse -->
      <div id="market-trades"
           class="flex-1 overflow-hidden flex flex-col-reverse"></div>
    </div>

    <!-- ── Exchange Status Grid ── -->
    <div class="flex-shrink-0 border-t border-neutral-800 p-2"
         style="max-height:112px; overflow-y:auto;">
      <div class="text-[8px] text-neutral-600 uppercase tracking-widest mb-1">
        Stream Status
      </div>
      <div id="ex-status-panel"></div>
    </div>

  </div><!-- /sidebar -->

  <script>
  // ═══════════════════════════════════════════════════════════════════════════
  // CONSTANTS
  // ═══════════════════════════════════════════════════════════════════════════
  const MAX_TAPE_ROWS  = 120;   // ring-buffer size
  const MAX_DOM_LEVELS = 12;    // visible book levels per side
  const TPS_WINDOW_MS  = 2000;  // window for trades-per-second calc

  // ═══════════════════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════════════════
  let currentBaseSymbol = 'BTCUSDT';
  let tapeBuffer   = [];   // ring buffer: unified trade objects
  let tapeStamped  = [];   // timestamps for TPS
  let lastPrice    = 0;
  let rollingVol   = 0;
  const sockets    = {};   // { id: WebSocket }
  const pingTimers = {};   // { id: intervalId }
  const book       = { asks: [], bids: [] };

  // ═══════════════════════════════════════════════════════════════════════════
  // EXCHANGE REGISTRY
  // ═══════════════════════════════════════════════════════════════════════════
  const EXCHANGES = [
    { id:'BINANCE',    label:'Binance'    },
    { id:'BINANCEFUT', label:'BNB Fut'    },
    { id:'BYBIT',      label:'Bybit'      },
    { id:'BYBITLIN',   label:'Bybit Lin'  },
    { id:'OKX',        label:'OKX'        },
    { id:'OKXFUT',     label:'OKX Fut'    },
    { id:'GATE',       label:'Gate.io'    },
    { id:'MEXC',       label:'MEXC'       },
    { id:'BITGET',     label:'Bitget'     },
    { id:'KUCOIN',     label:'KuCoin'     },
    { id:'CRYPTOCOM',  label:'Crypto.com' },
    { id:'BITSTAMP',   label:'Bitstamp'   },
    { id:'GEMINI',     label:'Gemini'     },
    { id:'KRAKEN',     label:'Kraken'     },
    { id:'COINBASE',   label:'Coinbase'   },
    { id:'BITFINEX',   label:'Bitfinex'   },
    { id:'HTX',        label:'HTX'        },
    { id:'PHEMEX',     label:'Phemex'     },
    { id:'POLONIEX',   label:'Poloniex'   },
    { id:'BINGX',      label:'BingX'      },
    { id:'WOOX',       label:'WOO X'      },
    { id:'DERIBIT',    label:'Deribit'    },
  ];

  const exStatus = {};
  EXCHANGES.forEach(e => exStatus[e.id] = 'disconnected');

  // ═══════════════════════════════════════════════════════════════════════════
  // SYMBOL MAP — per-exchange symbol strings
  // ═══════════════════════════════════════════════════════════════════════════
  const SYMBOL_MAP = {
    BTCUSDT: {
      BINANCE:'btcusdt', BINANCEFUT:'btcusdt',
      BYBIT:'BTCUSDT',   BYBITLIN:'BTCUSDT',
      OKX:'BTC-USDT',    OKXFUT:'BTC-USDT-SWAP',
      GATE:'BTC_USDT',   MEXC:'BTCUSDT',
      BITGET:'BTCUSDT',  KUCOIN:'BTC-USDT',
      CRYPTOCOM:'BTC_USDT', BITSTAMP:'btcusdt',
      GEMINI:'BTCUSD',   KRAKEN:'BTC/USDT',
      COINBASE:'BTC-USDT', BITFINEX:'tBTCUSD',
      HTX:'btcusdt',     PHEMEX:'BTCUSDT',
      POLONIEX:'BTC_USDT', BINGX:'BTC-USDT',
      WOOX:'SPOT_BTC_USDT', DERIBIT:'BTC_USDT',
    },
    ETHUSDT: {
      BINANCE:'ethusdt', BINANCEFUT:'ethusdt',
      BYBIT:'ETHUSDT',   BYBITLIN:'ETHUSDT',
      OKX:'ETH-USDT',    OKXFUT:'ETH-USDT-SWAP',
      GATE:'ETH_USDT',   MEXC:'ETHUSDT',
      BITGET:'ETHUSDT',  KUCOIN:'ETH-USDT',
      CRYPTOCOM:'ETH_USDT', BITSTAMP:'ethusdt',
      GEMINI:'ETHUSD',   KRAKEN:'ETH/USDT',
      COINBASE:'ETH-USDT', BITFINEX:'tETHUSD',
      HTX:'ethusdt',     PHEMEX:'ETHUSDT',
      POLONIEX:'ETH_USDT', BINGX:'ETH-USDT',
      WOOX:'SPOT_ETH_USDT', DERIBIT:'ETH_USDT',
    },
    SOLUSDT: {
      BINANCE:'solusdt', BINANCEFUT:'solusdt',
      BYBIT:'SOLUSDT',   BYBITLIN:'SOLUSDT',
      OKX:'SOL-USDT',    OKXFUT:'SOL-USDT-SWAP',
      GATE:'SOL_USDT',   MEXC:'SOLUSDT',
      BITGET:'SOLUSDT',  KUCOIN:'SOL-USDT',
      CRYPTOCOM:'SOL_USDT', BITSTAMP:'solusd',
      GEMINI:'SOLUSD',   KRAKEN:'SOL/USDT',
      COINBASE:'SOL-USDT', BITFINEX:'tSOLUSD',
      HTX:'solusdt',     PHEMEX:'SOLUSDT',
      POLONIEX:'SOL_USDT', BINGX:'SOL-USDT',
      WOOX:'SPOT_SOL_USDT', DERIBIT:null,
    },
    BNBUSDT: {
      BINANCE:'bnbusdt', BINANCEFUT:'bnbusdt',
      BYBIT:'BNBUSDT',   BYBITLIN:'BNBUSDT',
      OKX:'BNB-USDT',    OKXFUT:null,
      GATE:'BNB_USDT',   MEXC:'BNBUSDT',
      BITGET:'BNBUSDT',  KUCOIN:'BNB-USDT',
      CRYPTOCOM:'BNB_USDT', BITSTAMP:null,
      GEMINI:null,       KRAKEN:null,
      COINBASE:null,     BITFINEX:null,
      HTX:'bnbusdt',     PHEMEX:'BNBUSDT',
      POLONIEX:'BNB_USDT', BINGX:'BNB-USDT',
      WOOX:'SPOT_BNB_USDT', DERIBIT:null,
    },
    XRPUSDT: {
      BINANCE:'xrpusdt', BINANCEFUT:'xrpusdt',
      BYBIT:'XRPUSDT',   BYBITLIN:'XRPUSDT',
      OKX:'XRP-USDT',    OKXFUT:'XRP-USDT-SWAP',
      GATE:'XRP_USDT',   MEXC:'XRPUSDT',
      BITGET:'XRPUSDT',  KUCOIN:'XRP-USDT',
      CRYPTOCOM:'XRP_USDT', BITSTAMP:'xrpusdt',
      GEMINI:'XRPUSD',   KRAKEN:'XRP/USDT',
      COINBASE:'XRP-USDT', BITFINEX:'tXRPUSD',
      HTX:'xrpusdt',     PHEMEX:'XRPUSDT',
      POLONIEX:'XRP_USDT', BINGX:'XRP-USDT',
      WOOX:'SPOT_XRP_USDT', DERIBIT:null,
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // CHART — Official TradingView embed (script-tag injection)
  // ═══════════════════════════════════════════════════════════════════════════
  function updateChart(baseSymbol) {
    const container = document.getElementById('chart-container');
    container.innerHTML = '';

    const wrapper = document.createElement('div');
    wrapper.className = 'tradingview-widget-container';
    wrapper.style.cssText = 'width:100%;height:100%;';

    const inner = document.createElement('div');
    inner.className = 'tradingview-widget-container__widget';
    inner.style.cssText = 'width:100%;height:100%;';

    const script = document.createElement('script');
    script.type  = 'text/javascript';
    script.src   = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.textContent = JSON.stringify({
      autosize:            true,
      symbol:              `BINANCE:${baseSymbol}`,
      interval:            '1',
      timezone:            'Etc/UTC',
      theme:               'dark',
      style:               '1',
      locale:              'en',
      enable_publishing:   false,
      hide_side_toolbar:   false,
      allow_symbol_change: true,
      calendar:            false,
      hide_legend:         false,
      support_host:        'https://www.tradingview.com',
    });

    wrapper.appendChild(inner);
    wrapper.appendChild(script);
    container.appendChild(wrapper);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // EXCHANGE STATUS PANEL
  // ═══════════════════════════════════════════════════════════════════════════
  function buildStatusPanel() {
    const panel = document.getElementById('ex-status-panel');
    panel.innerHTML = '';
    EXCHANGES.forEach(({ id, label }) => {
      const chip = document.createElement('div');
      chip.className = 'ex-status-chip';
      chip.id = `chip-${id}`;
      chip.innerHTML =
        `<span class="status-dot connecting" id="dot-${id}"></span>` +
        `<span class="exl-${id} truncate">${label}</span>`;
      panel.appendChild(chip);
    });
  }

  function setExStatus(id, state) {
    exStatus[id] = state;
    const dot = document.getElementById(`dot-${id}`);
    if (dot) dot.className = `status-dot ${state}`;
    const n = Object.values(exStatus).filter(s => s === 'connected').length;
    document.getElementById('stat-streams').textContent = `${n}/22`;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TRADE INGESTION
  // ═══════════════════════════════════════════════════════════════════════════
  function ingestTrade({ exchange, price, qty, isBuy, ts }) {
    tapeBuffer.push({ exchange, price, qty, isBuy, ts: ts || Date.now() });
    tapeStamped.push(Date.now());
    if (tapeBuffer.length > MAX_TAPE_ROWS) tapeBuffer.shift();
    lastPrice  = price;
    rollingVol += qty;
    scheduleTapeRender();
    updateStats();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER — TAPE
  // ═══════════════════════════════════════════════════════════════════════════
  let tapeRafPending = false;
  function scheduleTapeRender() {
    if (tapeRafPending) return;
    tapeRafPending = true;
    requestAnimationFrame(() => {
      tapeRafPending = false;
      renderTape();
    });
  }

  function renderTape() {
    const el   = document.getElementById('market-trades');
    const frag = document.createDocumentFragment();

    for (let i = 0; i < tapeBuffer.length; i++) {
      const t   = tapeBuffer[i];
      const row = document.createElement('div');
      const sideClass = t.isBuy ? 'tape-buy' : 'tape-sell';

      row.className = `tape-row ${sideClass} ex-${t.exchange}`;

      const tm = new Date(t.ts).toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      row.innerHTML =
        `<span class="t-price">${t.price.toFixed(2)}</span>` +
        `<span class="t-qty">${t.qty.toFixed(4)}</span>` +
        `<span class="t-time">${tm}</span>`;

      frag.appendChild(row);
    }

    el.innerHTML = '';
    el.appendChild(frag);

    if (lastPrice > 0) {
      document.getElementById('ticker-price').textContent =
        `$${lastPrice.toLocaleString(undefined, {
          minimumFractionDigits: 2, maximumFractionDigits: 2
        })}`;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER — ORDER BOOK DOM
  // ═══════════════════════════════════════════════════════════════════════════
  let domRafPending = false;
  function scheduleBookRender() {
    if (domRafPending) return;
    domRafPending = true;
    requestAnimationFrame(() => {
      domRafPending = false;
      renderDOM();
    });
  }

  function renderDOM() {
    const asksEl   = document.getElementById('dom-asks');
    const bidsEl   = document.getElementById('dom-bids');
    const spreadEl = document.getElementById('dom-spread');

    const visAsks = book.asks.slice(0, MAX_DOM_LEVELS);
    const visBids = book.bids.slice(0, MAX_DOM_LEVELS);
    const allQtys = [
      ...visAsks.map(r => parseFloat(r[1])),
      ...visBids.map(r => parseFloat(r[1])),
    ];
    const maxQty = allQtys.length ? Math.max(...allQtys) : 1;

    const makeRows = (levels, side) => {
      const frag      = document.createDocumentFragment();
      const textColor = side === 'ask' ? 'text-red-400'   : 'text-green-400';
      const barColor  = side === 'ask' ? 'bg-red-500'     : 'bg-green-500';
      levels.forEach(([price, qty]) => {
        const p   = parseFloat(price), q = parseFloat(qty);
        const pct = Math.min(100, (q / maxQty) * 100).toFixed(1);
        const row = document.createElement('div');
        row.className = `depth-row ${textColor}`;
        row.innerHTML =
          `<div class="depth-bar ${barColor}" style="width:${pct}%"></div>` +
          `<span class="depth-col">${p.toFixed(2)}</span>` +
          `<span class="depth-col">${q.toFixed(4)}</span>`;
        frag.appendChild(row);
      });
      return frag;
    };

    asksEl.innerHTML = ''; asksEl.appendChild(makeRows(visAsks, 'ask'));
    bidsEl.innerHTML = ''; bidsEl.appendChild(makeRows(visBids, 'bid'));

    if (book.asks.length && book.bids.length) {
      const sp = parseFloat(book.asks[0][0]) - parseFloat(book.bids[0][0]);
      spreadEl.textContent = `SPREAD: $${sp.toFixed(2)}`;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // STATS BAR
  // ═══════════════════════════════════════════════════════════════════════════
  function updateStats() {
    const now = Date.now();
    tapeStamped = tapeStamped.filter(t => now - t < TPS_WINDOW_MS);
    document.getElementById('stat-tps').textContent =
      (tapeStamped.length / (TPS_WINDOW_MS / 1000)).toFixed(1);
    document.getElementById('stat-vol').textContent =
      rollingVol >= 1000
        ? `${(rollingVol / 1000).toFixed(1)}K`
        : rollingVol.toFixed(2);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // WEBSOCKET FACTORY — auto-reconnect with exponential back-off
  // ═══════════════════════════════════════════════════════════════════════════
  function makeWS(id, url, { onopen, onmessage, onping, pingIntervalMs } = {}) {
    return new Promise((resolve, reject) => {
      let ws;
      try { ws = new WebSocket(url); }
      catch (e) { return reject(e); }

      ws.binaryType = 'arraybuffer';
      sockets[id] = ws;

      ws.onopen = () => {
        setExStatus(id, 'connected');
        if (onopen) onopen(ws);
        if (onping && pingIntervalMs) {
          pingTimers[id] = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) onping(ws);
          }, pingIntervalMs);
        }
        resolve(ws);
      };

      ws.onmessage = ev => { try { onmessage(ev, ws); } catch (_) {} };
      ws.onerror   = ()  => {};
      ws.onclose   = ()  => {
        if (ws._dead) return;
        clearInterval(pingTimers[id]);
        setExStatus(id, 'disconnected');
        reject(new Error('ws closed'));
      };
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // GZIP HELPER (HTX, BingX, Bitfinex)
  // ═══════════════════════════════════════════════════════════════════════════
  async function gunzip(ab) {
    const ds     = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(ab));
    writer.close();
    const chunks = [];
    const reader = ds.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const out   = new Uint8Array(total);
    let   off   = 0;
    chunks.forEach(c => { out.set(c, off); off += c.length; });
    return new TextDecoder().decode(out);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // STREAM MANAGER
  // ═══════════════════════════════════════════════════════════════════════════
  function closeAll() {
    Object.keys(sockets).forEach(id => {
      const ws = sockets[id];
      if (ws) { ws._dead = true; ws.onclose = null; ws.close(); }
      delete sockets[id];
    });
    Object.keys(pingTimers).forEach(id => {
      clearInterval(pingTimers[id]);
      delete pingTimers[id];
    });
    EXCHANGES.forEach(e => setExStatus(e.id, 'disconnected'));
  }

  function openStream(id, factory, retryMs = 1500) {
    const sym = SYMBOL_MAP[currentBaseSymbol]?.[id];
    if (!sym) { setExStatus(id, 'disconnected'); return; }
    setExStatus(id, 'connecting');
    factory(sym, id).catch(() => {
      const next = Math.min(retryMs * 1.6, 30000);
      setTimeout(() => openStream(id, factory, next), retryMs);
    });
  }

  // 1. Binance Spot — depth20 + trade combined stream
  function connectBinance(sym, id) {
    return makeWS(id,
      `wss://stream.binance.com:9443/stream?streams=${sym}@depth20@100ms/${sym}@trade`,
      {
        onmessage(ev) {
          const env = JSON.parse(ev.data);
          if (env.stream?.includes('@depth')) {
            book.bids = env.data.bids;
            book.asks = env.data.asks;
            scheduleBookRender();
          } else if (env.stream?.includes('@trade')) {
            const d = env.data;
            ingestTrade({ exchange:'BINANCE', price:+d.p, qty:+d.q, isBuy:!d.m, ts:d.T });
          }
        }
      }
    );
  }

  // 10. KuCoin — REST token pre-fetch → dynamic WS URL
  async function connectKucoin(sym, id) {
    setExStatus(id, 'connecting');
    let tokenData;
    try {
      const r = await fetch('https://api.kucoin.com/api/v1/bullet-public', { method:'POST' });
      tokenData = await r.json();
    } catch {
      return Promise.reject(new Error('kucoin token fail'));
    }
    const { token, instanceServers } = tokenData.data;
    const url          = `${instanceServers[0].endpoint}?token=${token}`;
    const pingInterval = instanceServers[0].pingInterval;
    let msgId = 1;
    return makeWS(id, url, {
      onopen(ws) {
        ws.send(JSON.stringify({
          id: msgId++, type: 'subscribe',
          topic: `/market/match:${sym}`,
          privateChannel: false, response: true,
        }));
      },
      onmessage(ev) {
        const d = JSON.parse(ev.data);
        if (d.type === 'message' && d.topic?.includes('/market/match')) {
          const t = d.data;
          ingestTrade({ exchange:'KUCOIN', price:+t.price, qty:+t.size,
            isBuy: t.side === 'buy', ts: +t.time / 1e6 });
        }
      },
      onping(ws) { ws.send(JSON.stringify({ id:msgId++, type:'ping' })); },
      pingIntervalMs: pingInterval || 18000,
    });
  }

    return makeWS(id, 'wss://api-pub.bitfinex.com/ws/2', {
      onopen(ws) {
        ws.send(JSON.stringify({ event:'subscribe', channel:'trades', symbol:sym }));
      },
      onmessage: async (ev) => {
        let text;
        if (ev.data instanceof ArrayBuffer) {
          try { text = await gunzip(ev.data); }
          catch { text = new TextDecoder().decode(ev.data); }
        } else {
          text = ev.data;
        }
        const d = JSON.parse(text);
        // [CHANID, 'te', [ID, TS, AMOUNT, PRICE]]
        if (Array.isArray(d) && d[1] === 'te') {
          const [,, [, ts, amt, price]] = d;
          ingestTrade({ exchange:'BITFINEX', price:+price, qty:Math.abs(+amt), isBuy:+amt>0, ts });
        }
      },
      onping(ws) { ws.send(JSON.stringify({ event:'ping' })); },
      pingIntervalMs: 30000,
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // STREAM ORCHESTRATOR
  // ═══════════════════════════════════════════════════════════════════════════
  function launchAllStreams() {
    EXCHANGES.forEach(({ id }) => {
      const factory = ADAPTER_MAP[id];
      if (!factory) return;
      const jitter = Math.random() * 2000;
      setTimeout(() => openStream(id, (sym, xid) => factory(sym, xid)), jitter);
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SYMBOL SWITCH
  // ═══════════════════════════════════════════════════════════════════════════
  function switchSymbol(newBase) {
    currentBaseSymbol = newBase;
    tapeBuffer  = [];
    tapeStamped = [];
    lastPrice   = 0;
    rollingVol  = 0;
    book.asks   = [];
    book.bids   = [];

    document.getElementById('ticker-price').textContent   = '--';
    document.getElementById('dom-spread').textContent     = 'SPREAD: --';
    document.getElementById('market-trades').innerHTML    = '';
    document.getElementById('dom-asks').innerHTML         = '';
    document.getElementById('dom-bids').innerHTML         = '';

    closeAll();
    updateChart(newBase);
    setTimeout(launchAllStreams, 300);
  }
