<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Stream Trading Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #131722; color: #fff; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #131722; }
    ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 2px; }

    /* Depth rows */
    .depth-row {
      position: relative;
      display: flex;
      justify-content: space-between;
      padding: 1px 4px;
      font-size: 11px;
      line-height: 1.6;
    }
    .depth-bar {
      position: absolute; top: 0; bottom: 0; right: 0;
      opacity: 0.12; pointer-events: none;
    }
    .depth-col { position: relative; z-index: 1; }

    /* Exchange badge colours — one per exchange */
    .ex-BINANCE      { color: #f0b90b; }
    .ex-BINANCEFUT   { color: #f3d06d; }
    .ex-BYBIT        { color: #ff6b35; }
    .ex-BYBITLIN     { color: #ff9a6c; }
    .ex-OKX          { color: #60a5fa; }
    .ex-OKXFUT       { color: #93c5fd; }
    .ex-GATE         { color: #34d399; }
    .ex-MEXC         { color: #a78bfa; }
    .ex-BITGET       { color: #fb923c; }
    .ex-KUCOIN       { color: #22d3ee; }
    .ex-CRYPTOCOM    { color: #6366f1; }
    .ex-BITSTAMP     { color: #84cc16; }
    .ex-GEMINI       { color: #e879f9; }
    .ex-KRAKEN       { color: #7c3aed; }
    .ex-COINBASE     { color: #0ea5e9; }
    .ex-BITFINEX     { color: #f97316; }
    .ex-HTX          { color: #10b981; }
    .ex-PHEMEX       { color: #d946ef; }
    .ex-POLONIEX     { color: #fcd34d; }
    .ex-BINGX        { color: #38bdf8; }
    .ex-WOOX         { color: #ec4899; }
    .ex-DERIBIT      { color: #c084fc; }

    /* Status dot */
    .status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .status-dot.connected    { background:#22c55e; }
    .status-dot.connecting   { background:#f59e0b; animation: pulse 1s infinite; }
    .status-dot.disconnected { background:#ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Exchange status grid */
    #ex-status-panel { display:grid; grid-template-columns: repeat(3,1fr); gap:2px; }
    .ex-status-chip {
      display:flex; align-items:center; gap:3px;
      font-size:9px; padding:2px 4px;
      background:#1c2030; border-radius:3px;
      overflow:hidden;
    }

    /* Scrollable trade tape */
    #market-trades { overflow-y:hidden; }

    /* Chart iframe fills container */
    #chart-frame { width:100%; height:100%; border:none; display:block; }
  </style>
</head>
<body class="flex h-screen w-screen font-sans antialiased">

  <!-- ═══════════════════════════ LEFT: Chart (75%) ═══════════════════════════ -->
  <div class="w-3/4 h-full relative border-r border-neutral-800 flex-shrink-0" id="chart-viewport">
    <iframe id="chart-frame" src="" allowfullscreen></iframe>
  </div>

  <!-- ═══════════════════════════ RIGHT: Sidebar (25%) ═══════════════════════════ -->
  <div class="w-1/4 h-full flex flex-col bg-[#131722] select-none overflow-hidden">

    <!-- Header: symbol picker + stats -->
    <div class="p-2 border-b border-neutral-800 bg-[#1c2030] space-y-2 flex-shrink-0">
      <div class="flex items-center gap-2">
        <div class="flex-1">
          <label class="block text-[9px] font-bold text-neutral-500 tracking-widest uppercase mb-0.5">Instrument</label>
          <select id="asset-selector"
                  onchange="switchSymbol(this.value)"
                  class="w-full bg-[#131722] border border-neutral-800 text-xs text-yellow-400 font-mono font-bold py-1 px-2 rounded cursor-pointer focus:outline-none">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
            <option value="BNBUSDT">BNB / USDT</option>
            <option value="XRPUSDT">XRP / USDT</option>
          </select>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="text-[9px] text-neutral-500 uppercase tracking-wider mb-0.5">Last</div>
          <div id="ticker-price" class="font-mono font-bold text-sm text-neutral-100">--</div>
        </div>
      </div>

      <!-- Mini stats row -->
      <div class="grid grid-cols-3 gap-1 text-[9px] font-mono">
        <div class="bg-[#131722] rounded p-1">
          <div class="text-neutral-500">Streams</div>
          <div id="stat-streams" class="text-green-400 font-bold">0/22</div>
        </div>
        <div class="bg-[#131722] rounded p-1">
          <div class="text-neutral-500">Trades/s</div>
          <div id="stat-tps" class="text-yellow-400 font-bold">0</div>
        </div>
        <div class="bg-[#131722] rounded p-1">
          <div class="text-neutral-500">Volume</div>
          <div id="stat-vol" class="text-blue-400 font-bold">--</div>
        </div>
      </div>
    </div>

    <!-- Orderbook DOM (Binance primary) -->
    <div class="flex-shrink-0 px-2 pt-1 border-b border-neutral-800 pb-1" style="height:220px;">
      <div class="grid grid-cols-2 text-[9px] text-neutral-500 pb-0.5 border-b border-neutral-800 mb-0.5">
        <span class="font-mono">Price (USDT)</span>
        <span class="font-mono text-right">Size</span>
      </div>
      <!-- Asks rendered bottom-up inside this fixed-height reverse column -->
      <div id="dom-asks" class="flex flex-col-reverse overflow-hidden" style="height:87px;"></div>
      <div id="dom-spread" class="py-0.5 text-center text-yellow-400 font-bold text-[10px] font-mono bg-[#1c2030] rounded my-0.5">
        SPREAD: --
      </div>
      <div id="dom-bids" class="flex flex-col overflow-hidden" style="height:87px;"></div>
    </div>

    <!-- Unified Trade Tape -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="grid grid-cols-4 text-[9px] text-neutral-500 px-2 py-1 border-b border-neutral-800 bg-[#1c2030] flex-shrink-0">
        <span>Exch</span>
        <span class="font-mono">Price</span>
        <span class="font-mono text-right">Qty</span>
        <span class="font-mono text-right">Time</span>
      </div>
      <div id="market-trades" class="flex-1 overflow-hidden flex flex-col-reverse px-2 py-0.5 gap-0"></div>
    </div>

    <!-- Exchange status grid -->
    <div class="border-t border-neutral-800 p-2 flex-shrink-0" style="max-height:130px;overflow-y:auto;">
      <div class="text-[9px] text-neutral-500 uppercase tracking-widest mb-1">Stream Status</div>
      <div id="ex-status-panel"></div>
    </div>

  </div><!-- /sidebar -->

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  // CONSTANTS & STATE
  // ─────────────────────────────────────────────────────────────────────────────
  const MAX_TAPE_ROWS  = 80;   // max trades held in ring buffer
  const MAX_DOM_LEVELS = 10;   // visible book levels per side
  const TPS_WINDOW_MS  = 2000; // window for trades-per-second calc

  let currentBaseSymbol = 'BTCUSDT'; // e.g. "BTCUSDT"
  let tapeBuffer    = [];    // ring buffer of unified trade objects
  let tapeStamped   = [];    // timestamps for TPS calc
  let lastPrice     = 0;
  let rollingVolume = 0;
  let activeConnCount = 0;
  const sockets = {};        // { exchangeId: WebSocket }
  const pingTimers = {};     // { exchangeId: intervalId }

  // Primary orderbook state (Binance only)
  const book = { asks: [], bids: [] };

  // ─────────────────────────────────────────────────────────────────────────────
  // SYMBOL MAP  —  exchange-id → symbol string for that exchange
  // ─────────────────────────────────────────────────────────────────────────────

      HTX:        'bnbusdt',

    },
    XRPUSDT: {
      BINANCE:    'xrpusdt',
      BINANCEFUT: 'xrpusdt',
      BYBIT:      'XRPUSDT',

      OKX:        'XRP-USDT',

      GATE:       'XRP_USDT',
      MEXC:       'XRPUSDT',

      CRYPTOCOM:  'XRP_USDT',
      BITSTAMP:   'xrpusdt',
      GEMINI:     'XRPUSD',
      KRAKEN:     'XRP/USDT',
      COINBASE:   'XRP-USDT',
      BITFINEX:   'tXRPUSD',
      HTX:        'xrpusdt',
      PHEMEX:     'XRPUSDT',
      POLONIEX:   'XRP_USDT',

      WOOX:       'SPOT_XRP_USDT',
      DERIBIT:    null,
    },
  };

  // ─────────────────────────────────────────────────────────────────────────────
  // EXCHANGE STATUS REGISTRY  (label, color class, connected flag)
  // ─────────────────────────────────────────────────────────────────────────────
  const EXCHANGES = [
    { id:'BINANCE',    label:'Binance'     },
    { id:'BINANCEFUT', label:'BNB Fut'     },
    { id:'BYBIT',      label:'Bybit'       },
    { id:'BYBITLIN',   label:'Bybit Lin'   },
    { id:'OKX',        label:'OKX'         },
    { id:'OKXFUT',     label:'OKX Fut'     },
    { id:'GATE',       label:'Gate.io'     },
    { id:'MEXC',       label:'MEXC'        },
    { id:'BITGET',     label:'Bitget'      },
    { id:'KUCOIN',     label:'KuCoin'      },
    { id:'CRYPTOCOM',  label:'Crypto.com'  },
    { id:'BITSTAMP',   label:'Bitstamp'    },
    { id:'GEMINI',     label:'Gemini'      },
    { id:'KRAKEN',     label:'Kraken'      },
    { id:'COINBASE',   label:'Coinbase'    },
    { id:'BITFINEX',   label:'Bitfinex'    },
    { id:'HTX',        label:'HTX'         },
    { id:'PHEMEX',     label:'Phemex'      },
    { id:'POLONIEX',   label:'Poloniex'    },
    { id:'BINGX',      label:'BingX'       },
    { id:'WOOX',       label:'WOO X'       },
    { id:'DERIBIT',    label:'Deribit'     },
  ];

  const exStatus = {};   // { id: 'connected'|'connecting'|'disconnected' }
  EXCHANGES.forEach(e => exStatus[e.id] = 'disconnected');

  // ─────────────────────────────────────────────────────────────────────────────
  // CHART — TradingView iframe (recreated on symbol switch)
  // ─────────────────────────────────────────────────────────────────────────────
  function buildChartSrc(baseSymbol) {
    const tvSymbol = encodeURIComponent(`BINANCE:${baseSymbol}`);
    return `https://s3.tradingview.com/widgetembed/?frameElementId=tv_chart&symbol=${tvSymbol}` +
           `&interval=1&hidesidetoolbar=0&symboledit=1&saveimage=0&toolbarbg=1c2030` +
           `&theme=dark&style=1&timezone=Etc%2FUTC&studies=[]&locale=en` +
           `&utm_source=omni&utm_medium=widget`;
  }

  function updateChart(baseSymbol) {
    document.getElementById('chart-frame').src = buildChartSrc(baseSymbol);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // EXCHANGE STATUS PANEL
  // ─────────────────────────────────────────────────────────────────────────────
  function buildStatusPanel() {
    const panel = document.getElementById('ex-status-panel');
    panel.innerHTML = '';
    EXCHANGES.forEach(e => {
      const chip = document.createElement('div');
      chip.className = 'ex-status-chip';
      chip.id = `chip-${e.id}`;
      chip.innerHTML = `<span class="status-dot connecting" id="dot-${e.id}"></span>
                        <span class="ex-${e.id} truncate" style="font-size:8px">${e.label}</span>`;
      panel.appendChild(chip);
    });
  }

  function setExStatus(id, state) {
    exStatus[id] = state;
    const dot = document.getElementById(`dot-${id}`);
    if (dot) {
      dot.className = `status-dot ${state}`;
    }
    // Update connected count
    const n = Object.values(exStatus).filter(s => s === 'connected').length;
    document.getElementById('stat-streams').textContent = `${n}/22`;
    activeConnCount = n;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // UNIFIED TRADE INGESTION
  // ─────────────────────────────────────────────────────────────────────────────
  function ingestTrade({ exchange, price, qty, isBuy, ts }) {
    const t = { exchange, price, qty, isBuy, ts: ts || Date.now() };
    tapeBuffer.push(t);
    tapeStamped.push(Date.now());
    if (tapeBuffer.length > MAX_TAPE_ROWS) tapeBuffer.shift();

    // Update last price & volume (simple rolling accumulator)
    lastPrice = price;
    rollingVolume += qty;

    renderTape();
    updateStats();
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER FUNCTIONS
  // ─────────────────────────────────────────────────────────────────────────────
  // Trades tape
  let renderScheduled = false;
  function renderTape() {
    if (renderScheduled) return;
    renderScheduled = true;
    requestAnimationFrame(() => {
      renderScheduled = false;
      const el = document.getElementById('market-trades');
      const frag = document.createDocumentFragment();
      tapeBuffer.forEach(t => {
        const row = document.createElement('div');
        const side = t.isBuy ? 'text-green-400' : 'text-red-400';
        const tm   = new Date(t.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        row.className = `grid grid-cols-4 gap-0 font-mono text-[10px] py-px border-b border-neutral-900 ${side}`;
        row.innerHTML =
          `<span class="ex-${t.exchange} truncate font-bold text-[9px]">${t.exchange.slice(0,5)}</span>` +
          `<span>${t.price.toFixed(2)}</span>` +
          `<span class="text-right">${t.qty.toFixed(3)}</span>` +
          `<span class="text-right text-neutral-500 text-[9px]">${tm}</span>`;
        frag.appendChild(row);
      });
      el.innerHTML = '';
      el.appendChild(frag);

      // Update price ticker
      if (lastPrice > 0) {
        document.getElementById('ticker-price').textContent =
          `$${lastPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      }
    });
  }

  // Orderbook DOM
  let domScheduled = false;
  function renderDOM() {
    if (domScheduled) return;
    domScheduled = true;
    requestAnimationFrame(() => {
      domScheduled = false;

      const asksEl   = document.getElementById('dom-asks');
      const bidsEl   = document.getElementById('dom-bids');
      const spreadEl = document.getElementById('dom-spread');

      // Normalise bar widths against visible max qty
      const allQtys = [
        ...book.asks.slice(0, MAX_DOM_LEVELS).map(r => parseFloat(r[1])),
        ...book.bids.slice(0, MAX_DOM_LEVELS).map(r => parseFloat(r[1])),
      ];
      const maxQty = allQtys.length ? Math.max(...allQtys) : 1;

      const makeRows = (levels, side) => {
        const frag = document.createDocumentFragment();
        const colorClass = side === 'ask' ? 'text-red-400' : 'text-green-400';
        const barColor   = side === 'ask' ? 'bg-red-500'  : 'bg-green-500';
        levels.slice(0, MAX_DOM_LEVELS).forEach(([price, qty]) => {
          const p = parseFloat(price), q = parseFloat(qty);
          const pct = Math.min(100, (q / maxQty) * 100).toFixed(1);
          const row = document.createElement('div');
          row.className = `depth-row ${colorClass}`;
          row.innerHTML =
            `<div class="depth-bar ${barColor}" style="width:${pct}%"></div>` +
            `<span class="depth-col">${p.toFixed(2)}</span>` +
            `<span class="depth-col">${q.toFixed(4)}</span>`;
          frag.appendChild(row);
        });
        return frag;
      };

      asksEl.innerHTML = ''; asksEl.appendChild(makeRows(book.asks, 'ask'));
      bidsEl.innerHTML = ''; bidsEl.appendChild(makeRows(book.bids, 'bid'));

      if (book.asks.length && book.bids.length) {
        const sp = parseFloat(book.asks[0][0]) - parseFloat(book.bids[0][0]);
        spreadEl.textContent = `SPREAD: $${sp.toFixed(2)}`;
      }
    });
  }

  // Stats bar (TPS + volume)
  function updateStats() {
    const now = Date.now();
    tapeStamped = tapeStamped.filter(t => now - t < TPS_WINDOW_MS);
    const tps = (tapeStamped.length / (TPS_WINDOW_MS / 1000)).toFixed(1);
    document.getElementById('stat-tps').textContent = tps;
    document.getElementById('stat-vol').textContent =
      rollingVolume > 1000
        ? `${(rollingVolume / 1000).toFixed(1)}K`
        : rollingVolume.toFixed(1);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // STREAM MANAGER  —  open / close / reconnect with exponential backoff
  // ─────────────────────────────────────────────────────────────────────────────
  function closeAll() {
    Object.keys(sockets).forEach(id => {
      const ws = sockets[id];
      if (ws) { ws._dead = true; ws.onclose = null; ws.close(); }
      delete sockets[id];
    });
    Object.keys(pingTimers).forEach(id => {
      clearInterval(pingTimers[id]);
      delete pingTimers[id];
    });
    EXCHANGES.forEach(e => setExStatus(e.id, 'disconnected'));
  }

  function openStream(id, factory, retryMs = 1500) {
    const sym = SYMBOL_MAP[currentBaseSymbol]?.[id];
    if (!sym) { setExStatus(id, 'disconnected'); return; }

    setExStatus(id, 'connecting');
    factory(sym, id).catch(() => {
      setExStatus(id, 'disconnected');
      const nextRetry = Math.min(retryMs * 1.6, 30000);
      setTimeout(() => openStream(id, factory, nextRetry), retryMs);
    });
  }

  // Helper to create a standard WebSocket with auto-reconnect glue
  function makeWS(id, url, { onopen, onmessage, onping, pingIntervalMs } = {}) {
    return new Promise((resolve, reject) => {
      let ws;
      try { ws = new WebSocket(url); }
      catch (e) { return reject(e); }

      ws.binaryType = 'arraybuffer';
      sockets[id] = ws;

      ws.onopen = () => {
        setExStatus(id, 'connected');
        if (onopen) onopen(ws);
        if (onping && pingIntervalMs) {
          pingTimers[id] = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) onping(ws);
          }, pingIntervalMs);
        }
        resolve(ws);
      };

      ws.onmessage = (ev) => { try { onmessage(ev, ws); } catch(_) {} };

      ws.onerror = () => {};

      ws.onclose = () => {
        if (ws._dead) return;
        clearInterval(pingTimers[id]);
        setExStatus(id, 'disconnected');
        reject(new Error('closed'));
      };
    });
  }

  // GZip decompressor for HTX / Bitfinex using browser DecompressionStream
  async function gunzip(ab) {
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(ab));
    writer.close();
    const chunks = [];
    const reader = ds.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const out = new Uint8Array(total);
    let offset = 0;
    chunks.forEach(c => { out.set(c, offset); offset += c.length; });
    return new TextDecoder().decode(out);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // ADAPTER FACTORIES  —  one per exchange
  // ─────────────────────────────────────────────────────────────────────────────

  // 1. BINANCE SPOT  (combined depth + trade stream)
  function connectBinance(sym, id) {
    const url = `wss://stream.binance.com:9443/stream?streams=${sym}@depth20@100ms/${sym}@trade`;
    return makeWS(id, url, {
      onmessage(ev) {
        const env = JSON.parse(ev.data);
        if (env.stream?.includes('@depth')) {
          book.bids = env.data.bids;
          book.asks = env.data.asks;
          renderDOM();
        } else if (env.stream?.includes('@trade')) {
          const d = env.data;
          ingestTrade({ exchange:'BINANCE', price:+d.p, qty:+d.q, isBuy:!d.m, ts:d.T });
        }
      }
    });
  }

  // 10. KUCOIN  (needs REST token pre-fetch → dynamic WS URL)
  async function connectKucoin(sym, id) {
    setExStatus(id, 'connecting');
    let tokenData;
    try {
      const r = await fetch('https://api.kucoin.com/api/v1/bullet-public', { method:'POST' });
      tokenData = await r.json();
    } catch {
      return Promise.reject(new Error('kucoin token fail'));
    }
    const { token, instanceServers } = tokenData.data;
    const wsEndpoint = instanceServers[0].endpoint;
    const pingInterval = instanceServers[0].pingInterval;
    const url = `${wsEndpoint}?token=${token}`;
    let msgId = 1;
    return makeWS(id, url, {
      onopen(ws) {
        ws.send(JSON.stringify({
          id: msgId++, type:'subscribe',
          topic:`/market/match:${sym}`, privateChannel:false, response:true
        }));
      },
      onmessage(ev) {
        const d = JSON.parse(ev.data);
        if (d.type === 'message' && d.topic?.includes('/market/match')) {
          const t = d.data;
          ingestTrade({ exchange:'KUCOIN', price:+t.price, qty:+t.size, isBuy:t.side==='buy', ts:+t.time/1e6 });
        }
      },
      onping(ws) { ws.send(JSON.stringify({ id:msgId++, type:'ping' })); },
      pingIntervalMs: pingInterval || 18000,
    });
  }

  // 16. BITFINEX  (GZip compressed)
  function connectBitfinex(sym, id) {
    return makeWS(id, 'wss://api-pub.bitfinex.com/ws/2', {
      onopen(ws) {
        ws.send(JSON.stringify({ event:'subscribe', channel:'trades', symbol:sym }));
      },
      onmessage: async (ev) => {
        let text;
        if (ev.data instanceof ArrayBuffer) {
          try { text = await gunzip(ev.data); }
          catch { text = new TextDecoder().decode(ev.data); }
        } else {
          text = ev.data;
        }
        const d = JSON.parse(text);
        // Bitfinex: [CHANID, 'te', [ID, TS, AMOUNT, PRICE]]
        if (Array.isArray(d) && d[1] === 'te') {
          const [,, [, ts, amt, price]] = d;
          ingestTrade({ exchange:'BITFINEX', price:+price, qty:Math.abs(+amt), isBuy:+amt>0, ts });
        }
      },
      onping(ws) { ws.send(JSON.stringify({ event:'ping' })); },
      pingIntervalMs: 30000,
    });
  }

      onmessage: async (ev) => {

        try { text = await gunzip(ev.data); }
        catch { return; }
        const d = JSON.parse(text);
        if (d.ping) {
          sockets[id]?.send(JSON.stringify({ pong: d.ping }));
          return;
        }
        if (d.ch?.includes('trade.detail') && d.tick) {
          (d.tick.data || []).forEach(t =>

          );
        }

    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // STREAM ORCHESTRATOR
  // ─────────────────────────────────────────────────────────────────────────────
  const ADAPTER_MAP = {
    BINANCE:    connectBinance,
    BINANCEFUT: connectBinanceFut,
    BYBIT:      connectBybit,
    BYBITLIN:   connectBybitLin,
    OKX:        connectOKX,
    OKXFUT:     connectOKXFut,
    GATE:       connectGate,
    MEXC:       connectMEXC,
    BITGET:     connectBitget,
    KUCOIN:     connectKucoin,
    CRYPTOCOM:  connectCryptoCom,
    BITSTAMP:   connectBitstamp,
    GEMINI:     connectGemini,
    KRAKEN:     connectKraken,
    COINBASE:   connectCoinbase,
    BITFINEX:   connectBitfinex,
    HTX:        connectHTX,
    PHEMEX:     connectPhemex,
    POLONIEX:   connectPoloniex,
    BINGX:      connectBingX,
    WOOX:       connectWooX,
    DERIBIT:    connectDeribit,
  };

  function launchAllStreams() {
    EXCHANGES.forEach(({ id }) => {
      const factory = ADAPTER_MAP[id];
      if (!factory) return;
      // stagger connection attempts to avoid thundering-herd
      const jitter = Math.random() * 2000;
      setTimeout(() => openStream(id, (sym, xid) => factory(sym, xid)), jitter);
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // SYMBOL SWITCH
  // ─────────────────────────────────────────────────────────────────────────────
  function switchSymbol(newBase) {
    currentBaseSymbol = newBase;
    tapeBuffer = [];
    tapeStamped = [];
    lastPrice = 0;
    rollingVolume = 0;
    book.asks = [];
    book.bids = [];
    document.getElementById('ticker-price').textContent = '--';
    document.getElementById('dom-spread').textContent = 'SPREAD: --';
    document.getElementById('market-trades').innerHTML = '';
    document.getElementById('dom-asks').innerHTML = '';
    document.getElementById('dom-bids').innerHTML = '';

    closeAll();
    updateChart(newBase);
    // Short delay to let sockets fully drain before reopening
    setTimeout(launchAllStreams, 300);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // KEYBOARD: ESC closes any future modals (extension point)
  // ─────────────────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      // no modals in this build, but handler is wired for extensions
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // BOOT
  // ─────────────────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    buildStatusPanel();
    updateChart(currentBaseSymbol);
    launchAllStreams();
  });
  </script>
